[language-server.millet]
command = "millet-ls"

[[language]]
name = "sml"
auto-format = false
file-types = ["sml", "ml", "sig"]
language-servers = [ "millet" ]
formatter = { command = "smlfmt" }

[language-server.tinymist]
command = "tinymist"
config = { preview.background.enabled = true, preview.background.args = ["--data-plane-host=127.0.0.1:23635", "--invert-colors=never", "--open"] }

[[language]]
name = "typst"
language-servers = ["tinymist"]

[language-server.ruby-lsp]
command = "ruby-lsp"
config = { diagnostics = true, formatting = true }

[[language]]
name = "ruby"
language-servers = ["ruby-lsp"]
auto-format = true
